<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Visual Runtime Fixture</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f7f8fb;
        --surface: #ffffff;
        --text: #172033;
        --muted: #5b6575;
        --accent: #0f766e;
        --border: #d8dee8;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--background);
        color: var(--text);
      }
      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 24px;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }
      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.5;
      }
      .metric-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }
      .metric {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 16px;
      }
      .metric strong {
        display: block;
        color: var(--accent);
        font-size: 28px;
      }
      @media (max-width: 640px) {
        main {
          padding: 28px 16px;
        }
        .metric-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Visual Runtime Fixture</h1>
        <p>This fixture gives the shared runtime a stable page for local screenshot, PDF, and lint checks.</p>
        <div class="metric-row">
          <div class="metric"><strong>3</strong> viewports</div>
          <div class="metric"><strong>0</strong> console errors</div>
          <div class="metric"><strong>1</strong> evidence loop</div>
        </div>
      </section>
    </main>
  </body>
</html>
