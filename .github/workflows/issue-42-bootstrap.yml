name: Issue 42 Bootstrap

on:
  push:
    branches:
      - agent/issue-42-generated-repository-artifacts
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Upload repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: issue-42-repository
          path: |
            .
            !.git/**
          include-hidden-files: true
          if-no-files-found: error
