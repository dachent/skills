name: Finalize code-intelligence catalog

on:
  push:
    branches:
      - agent/add-code-intelligence

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.head_commit.message == 'Finalize code intelligence catalog'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/add-code-intelligence
          fetch-depth: 0
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Update manifest and generated catalog
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('skills-manifest.json')
          manifest = json.loads(path.read_text(encoding='utf-8'))
          skill = next(item for item in manifest['skills'] if item['name'] == 'code-intelligence')
          skill['description'] = (
              'Route repository understanding and change-impact work across direct source inspection, '
              'fresh Graphify discovery, Python-focused code-mapper analysis, selective CodeQL enrichment, '
              'and explicit durable repo-map planning. Use for unfamiliar repositories, architecture questions, '
              'locating implementations, Python blast radius, contracts, artifacts, lineage, security-flow triage, '
              'and graph freshness decisions.'
          )
          path.write_text(json.dumps(manifest, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY
          python tools/generate_repository_artifacts.py
          python tools/validate_skill_manifest.py
          python tools/generate_repository_artifacts.py --check
          python -m unittest discover -s code-intelligence/scripts -p 'test_*.py' -v
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/finalize-code-intelligence-catalog.yml
          git add skills-manifest.json README.md .generated/agent-mirrors.json
          git commit -m 'Synchronize minimal code intelligence catalog'
          git push origin HEAD:agent/add-code-intelligence
