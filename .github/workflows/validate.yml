name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
              Install-Module -Name PSScriptAnalyzer -Repository PSGallery -Scope CurrentUser -Force
          }

      - name: Validate skill metadata and references
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          .\tools\validate_repo.ps1

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          .\tools\validate_powershell.ps1 -SettingsPath '.github\PSScriptAnalyzerSettings.psd1'

      - name: Compile Python files
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $compilePaths = @('tools')
          $compilePaths += Get-ChildItem -Path . -Directory -Recurse -Filter scripts |
            Where-Object { $_.FullName -notmatch '\\node_modules\\' } |
            ForEach-Object { $_.FullName }
          python -m compileall -q @compilePaths

      - name: Validate provenance metadata
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          python .\tools\validate_provenance.py

      - name: Validate Office COM contract
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          python .\tools\test_office_com_contract.py

      - name: Validate shared visual runtime
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          python .\tools\test_visual_runtime_contract.py
          Push-Location .shared\visual-runtime
          npm ci --ignore-scripts
          npm run check
          Pop-Location
