name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/issue-42-generated-repository-artifacts

permissions:
  contents: write

jobs:
  diagnose-issue-42:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-42-generated-repository-artifacts
          fetch-depth: 0
          show-progress: false
      - name: Diagnose patch bundle
        shell: bash
        run: |
          set +e
          {
            echo '== chunks =='
            wc -c .issue-42-patch/final0{0..7}
            sha256sum .issue-42-patch/final0{0..7}
            cat .issue-42-patch/final0{0..7} > /tmp/issue-42.b64
            echo '== concatenated base64 =='
            wc -c /tmp/issue-42.b64
            sha256sum /tmp/issue-42.b64
            base64 --decode /tmp/issue-42.b64 > /tmp/issue-42.patch.gz
            echo "base64_status=$?"
            wc -c /tmp/issue-42.patch.gz
            sha256sum /tmp/issue-42.patch.gz
            gzip --test /tmp/issue-42.patch.gz
            echo "gzip_status=$?"
            gzip --decompress --stdout /tmp/issue-42.patch.gz > /tmp/issue-42.patch
            echo "gunzip_status=$?"
            wc -c /tmp/issue-42.patch
            sha256sum /tmp/issue-42.patch
            echo '== apply check =='
            git apply --check --exclude=.github/workflows/validate.yml --exclude=.github/workflows/issue-42-bootstrap.yml /tmp/issue-42.patch
            echo "apply_status=$?"
          } > .issue-42-diagnostic.txt 2>&1
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .issue-42-diagnostic.txt
          git commit -m "Diagnose issue 42 patch application"
          git push origin HEAD:agent/issue-42-generated-repository-artifacts
