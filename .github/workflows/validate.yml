name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/issue-42-generated-repository-artifacts

permissions:
  contents: write

jobs:
  apply-issue-42:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-42-generated-repository-artifacts
          fetch-depth: 0
          show-progress: false
      - name: Apply implementation
        shell: bash
        run: |
          set -euxo pipefail
          cat .issue-42-patch/final0{0..7} > /tmp/issue-42.b64
          echo "a5d3c32532e02babd338353260e3540b641fb75318438ab66386e806cdf122a7  /tmp/issue-42.b64" | sha256sum --check
          base64 --decode /tmp/issue-42.b64 | gzip --decompress > /tmp/issue-42.patch
          git apply --exclude=.github/workflows/validate.yml --exclude=.github/workflows/issue-42-bootstrap.yml /tmp/issue-42.patch
          rm -rf .issue-42-patch .issue-42-diagnostic.txt .github/workflows/issue-42-bootstrap.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m "Implement manifest-generated repository artifacts"
          git push origin HEAD:agent/issue-42-generated-repository-artifacts
