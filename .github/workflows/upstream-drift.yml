name: Upstream Drift

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * 1"
  pull_request:
    paths:
      - ".provenance/**"
      - ".upstream/**"
      - "skills-manifest.json"
      - "tools/check_upstream_drift.py"
      - "tools/validate_provenance.py"
      - ".github/workflows/upstream-drift.yml"

permissions:
  contents: read
  issues: write

concurrency:
  group: upstream-drift-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Validate provenance registry
        run: python tools/validate_provenance.py
      - name: Check all registered upstreams
        env:
          GH_TOKEN: ${{ github.token }}
        run: python tools/check_upstream_drift.py --json .upstream/reports/latest-drift.json
      - name: Upload drift report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: upstream-drift-report
          path: .upstream/reports/latest-drift.json
          if-no-files-found: error
      - name: Create or update drift review issue
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('.upstream/reports/latest-drift.json', 'utf8'));
            const title = 'Upstream drift review';
            const marker = '<!-- upstream-drift-review -->';
            const impacted = report.impacted_skills || [];
            const body = `${marker}\n## Latest automated review\n\n` +
              (impacted.length ? `Impacted or unresolved skills: ${impacted.map(x => `\`${x}\``).join(', ')}.` : 'No registered skill is currently impacted.') +
              `\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const {data: issues} = await github.rest.issues.listForRepo({owner: context.repo.owner, repo: context.repo.repo, state: 'open'});
            const existing = issues.find(issue => issue.title === title || issue.body?.includes(marker));
            if (report.review_required) {
              if (existing) await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body});
              else await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title, body});
            } else if (existing) {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body: 'Automated drift review is now clear; closing.'});
              await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, state: 'closed'});
            }
