name: Code Mapper CodeQL

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-mapper-codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Code Mapper authoritative tests
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install mapper dependencies
        shell: pwsh
        run: python -m pip install -r ./code-mapper-skill/scripts/requirements.txt
      - name: Compile mapper
        shell: pwsh
        run: python -m compileall -q ./code-mapper-skill/scripts
      - name: Scanner, canonical CLI, policy, and lifecycle tests
        shell: pwsh
        run: |
          Push-Location ./code-mapper-skill/scripts
          python -m unittest -v smoke_test test_safety test_codeql_policy test_codeql_runtime test_codeql_cli
          Pop-Location
      - name: CodeQL overhead benchmark gate
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Push-Location ./code-mapper-skill/scripts
          $passed = $false
          foreach ($attempt in 1..3) {
            Write-Host "Benchmark attempt $attempt of 3"
            python ./benchmark_codeql_overhead.py --runs 15 --max-delta-percent 10
            if ($LASTEXITCODE -eq 0) {
              $passed = $true
              break
            }
            Start-Sleep -Seconds 2
          }
          Pop-Location
          if (-not $passed) { throw 'CodeQL overhead benchmark failed three consecutive attempts.' }
      - name: Set up official CodeQL CLI
        id: setup-codeql
        uses: github/codeql-action/setup-codeql@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: python
      - name: Run real CodeQL build-query-decode smoke test
        shell: pwsh
        env:
          CODEQL_CLI: ${{ steps.setup-codeql.outputs.codeql-path }}
          CODE_MAPPER_ALLOW_CODEQL_SETUP: "1"
        run: |
          Push-Location ./code-mapper-skill/scripts
          python -m unittest -v test_codeql_live
          Pop-Location
      - name: Write standardized result
        if: always()
        shell: pwsh
        run: |
          $status = switch ('${{ job.status }}') {
            'success' { 'passed' }
            'cancelled' { 'cancelled' }
            default { 'failed' }
          }
          python ./tools/write_test_result.py `
            --skill code-mapper-skill `
            --status $status `
            --authority .github/workflows/code-mapper-codeql.yml `
            --detail 'CodeQL lifecycle, benchmark, and live query validation' `
            --output .test-results/code-mapper-skill-windows-latest.json
      - name: Upload Code Mapper results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: skill-result-code-mapper-skill-windows-latest
          path: |
            .test-results/code-mapper-skill-windows-latest.json
            code-mapper-skill/scripts/codeql-live-diagnostic.json
          if-no-files-found: warn
