name: One-time code-intelligence manifest sync

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.ref == 'agent/add-code-intelligence'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/add-code-intelligence
          fetch-depth: 0
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Register code-intelligence and regenerate artifacts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('skills-manifest.json')
          manifest = json.loads(path.read_text(encoding='utf-8'))
          skills = manifest['skills']
          if not any(skill.get('name') == 'code-intelligence' for skill in skills):
              entry = {
                  'name': 'code-intelligence',
                  'path': 'code-intelligence',
                  'family': 'code-analysis',
                  'catalog_group': 'repository-owned',
                  'status': 'experimental',
                  'description': 'Route codebase understanding and change-impact work across repository discovery, precise symbol analysis, artifact lineage, contracts, semantic flow, and durable planning. Use for unfamiliar repositories, architecture questions, locating implementations, blast-radius analysis, callers and references, data lineage, security or taint flow, graph freshness decisions, and selecting among Graphify, code-mapper, direct source inspection, repo-map, CodeQL, Joern, Serena, SCIP, or other configured providers.',
                  'platforms': ['cross-platform'],
                  'agents': ['codex'],
                  'runtimes': {'type': 'code-analysis'},
                  'packaging': {
                      'skill_file': 'code-intelligence/SKILL.md',
                      'agent_metadata': 'code-intelligence/agents/openai.yaml',
                      'provenance_file': 'code-intelligence/PROVENANCE.md',
                  },
                  'source': {'classification': 'repo-owned-original'},
                  'validation': {
                      'ci_enabled': True,
                      'hosted_commands': ['python -m unittest discover -s .\\code-intelligence\\scripts -p "test_*.py" -v'],
                      'environment_dependent_commands': [],
                  },
                  'owner': '@dachent',
                  'last_reviewed': '2026-07-12',
              }
              insert_at = next((i for i, skill in enumerate(skills) if skill.get('name') == 'code-mapper-skill'), len(skills))
              skills.insert(insert_at, entry)
          path.write_text(json.dumps(manifest, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY
          python tools/generate_repository_artifacts.py
          python tools/validate_skill_manifest.py
          python tools/generate_repository_artifacts.py --check
          python -m unittest discover -s code-intelligence/scripts -p 'test_*.py' -v
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add skills-manifest.json README.md .generated/agent-mirrors.json
          if git diff --cached --quiet; then
            echo 'No generated changes required.'
          else
            git commit -m 'Register code intelligence in repository catalog'
            git push origin HEAD:agent/add-code-intelligence
          fi
